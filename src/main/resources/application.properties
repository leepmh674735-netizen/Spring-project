spring.application.name=crucial

# 1. Spring DataSource (MySQL 연결 설정)
spring.datasource.url=jdbc:mysql://localhost:3306/journal?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=springboot
spring.datasource.password=springboot

# 커넥션 풀(HikariCP) 검증 설정 (스프링 부트 2.x~3.x 기본 권장 옵션)
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.minimum-idle=5

# 2. JPA & Hibernate 설정
spring.jpa.show-sql=true
# 운영 환경에서는 update 또는 none 권장, 개발 단계에서만 create-drop 사용
spring.jpa.hibernate.ddl-auto=create-drop

# 최신 하이버네이트 명명 규칙 물리 전략 기본값 설정 (ImprovedNamingStrategy는 삭제됨)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# 최신 MySQL 버전에 맞는 Dialect 사양 (방언을 직접 명시하지 않아도 최근 스프링은 자동 인식함)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. Spring Data REST 설정 (중복 항목 제거 및 이름 통정)
spring.data.rest.base-path=/api

# 4. Actuator 모니터링 및 엔드포인트 설정 (최신 규격 적용)
management.endpoints.web.base-path=/monitor
management.endpoint.shutdown.enabled=true
management.endpoints.web.exposure.include=health,info,shutdown

# 5. Server & SSL (HTTPS) 설정
server.port=8443
server.ssl.key-store=classpath:keystore.jks
server.ssl.key-store-password=tomcat
server.ssl.key-password=tomcat
